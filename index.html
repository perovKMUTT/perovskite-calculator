<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Perovskite Solution Calculator</title>
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Perovskite Calc">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-header">
    <img src="icons/kmutt-logo.png" alt="KMUTT Logo" class="topbar-logo">
    <div>
      <div class="topbar-org">ISC Laboratory</div>
      <div class="topbar-title" id="pageTitle">Perovskite Solution Calculator</div>
    </div>
  </div>
</header>

<svg id="perovskite-viz" style="display:none;" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotate { to { transform: rotateX(360deg) rotateY(360deg); } }
    .perov-group { transform-origin: 100px 100px; animation: rotate 8s linear infinite; }
    .a-ion { fill: #7c3aed; }
    .b-ion { fill: #f97316; }
    .x-ion { fill: #06b6d4; }
    .label { font-size: 10px; font-weight: bold; fill: white; }
  </style>
  <g class="perov-group">
    <!-- B (Pb) center -->
    <circle cx="100" cy="100" r="12" class="b-ion"/>
    <text x="100" y="105" text-anchor="middle" class="label">Pb</text>

    <!-- X (I/Br) at corners -->
    <circle cx="60" cy="60" r="8" class="x-ion"/>
    <circle cx="140" cy="60" r="8" class="x-ion"/>
    <circle cx="60" cy="140" r="8" class="x-ion"/>
    <circle cx="140" cy="140" r="8" class="x-ion"/>
    <circle cx="100" cy="60" r="8" class="x-ion"/>
    <circle cx="100" cy="140" r="8" class="x-ion"/>
    <circle cx="60" cy="100" r="8" class="x-ion"/>
    <circle cx="140" cy="100" r="8" class="x-ion"/>

    <!-- A (MA/FA) corners (larger sphere) -->
    <circle cx="50" cy="50" r="10" class="a-ion" opacity="0.7"/>
    <text x="50" y="55" text-anchor="middle" class="label" font-size="8">A</text>
  </g>
</svg>

<main id="app"></main>

<footer class="app-footer">
  <p>&copy; 2026 ISC Laboratory, KMUTT. All rights reserved.</p>
</footer>

<nav class="bottomnav">
  <button data-page="setup" class="nav-btn active"><span class="ic">①</span><span>Setup</span></button>
  <button data-page="mapbi3" class="nav-btn"><span class="ic">Pb</span><span>MAPbI₃</span></button>
  <button data-page="fapbi3" class="nav-btn"><span class="ic">Pb</span><span>FAPbI₃</span></button>
  <button data-page="mapbbr3" class="nav-btn"><span class="ic">Pb</span><span>MAPbBr₃</span></button>
  <button data-page="mixed" class="nav-btn"><span class="ic">⚗</span><span>Mixed</span></button>
  <button data-page="dopants" class="nav-btn"><span class="ic">+</span><span>Dopants</span></button>
  <button data-page="spiro" class="nav-btn"><span class="ic">H</span><span>Spiro</span></button>
  <button data-page="ptaa" class="nav-btn"><span class="ic">H</span><span>PTAA</span></button>
  <button data-page="density" class="nav-btn"><span class="ic">ρ</span><span>Density</span></button>
</nav>

<script src="data.js"></script>
<script src="calc.js"></script>
<script src="app.js"></script>
</body>
</html>
