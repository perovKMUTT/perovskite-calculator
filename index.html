<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Perovskite Solution Calculator</title>
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Perovskite Calc">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-header">
    <img src="icons/kmutt-logo.png" alt="KMUTT Logo" class="topbar-logo">
    <div>
      <div class="topbar-org">ISC Laboratory</div>
      <div class="topbar-title" id="pageTitle">Perovskite Solution Calculator</div>
    </div>
  </div>
</header>

<svg id="perovskite-viz" style="display:none;" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotatePerov {
      0% { transform: rotateX(-20deg) rotateY(0deg); }
      100% { transform: rotateX(-20deg) rotateY(360deg); }
    }
    .perov-group {
      transform-origin: 120px 120px;
      animation: rotatePerov 10s linear infinite;
      transform-style: preserve-3d;
    }
    .a-ion { fill: #7c3aed; opacity: 0.8; }
    .b-ion { fill: #f97316; }
    .x-ion { fill: #06b6d4; }
    .bond { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .label { font-size: 11px; font-weight: bold; fill: white; text-anchor: middle; }
  </style>
  <g class="perov-group">
    <!-- Bonds from center Pb to X anions -->
    <line x1="120" y1="120" x2="120" y2="60" class="bond"/>
    <line x1="120" y1="120" x2="120" y2="180" class="bond"/>
    <line x1="120" y1="120" x2="60" y2="120" class="bond"/>
    <line x1="120" y1="120" x2="180" y2="120" class="bond"/>
    <line x1="120" y1="120" x2="155" y2="85" class="bond" opacity="0.6"/>
    <line x1="120" y1="120" x2="85" y2="155" class="bond" opacity="0.6"/>

    <!-- Central Pb ion (B site) -->
    <circle cx="120" cy="120" r="14" class="b-ion"/>
    <text x="120" y="126" class="label" font-size="12">Pb</text>

    <!-- Octahedral X anions (halides at corners) -->
    <!-- Top -->
    <circle cx="120" cy="55" r="10" class="x-ion"/>
    <text x="120" y="61" class="label" font-size="10">X</text>

    <!-- Bottom -->
    <circle cx="120" cy="185" r="10" class="x-ion"/>
    <text x="120" y="191" class="label" font-size="10">X</text>

    <!-- Left -->
    <circle cx="55" cy="120" r="10" class="x-ion"/>
    <text x="55" y="126" class="label" font-size="10">X</text>

    <!-- Right -->
    <circle cx="185" cy="120" r="10" class="x-ion"/>
    <text x="185" y="126" class="label" font-size="10">X</text>

    <!-- Front-top-right (3D perspective) -->
    <circle cx="155" cy="85" r="10" class="x-ion" opacity="0.8"/>
    <text x="155" y="91" class="label" font-size="10">X</text>

    <!-- Back-bottom-left (3D perspective) -->
    <circle cx="85" cy="155" r="10" class="x-ion" opacity="0.8"/>
    <text x="85" y="161" class="label" font-size="10">X</text>

    <!-- A cations at cube corners (larger, faded) -->
    <circle cx="50" cy="50" r="12" class="a-ion"/>
    <text x="50" y="57" class="label" font-size="10">A</text>

    <circle cx="190" cy="50" r="12" class="a-ion"/>
    <text x="190" y="57" class="label" font-size="10">A</text>

    <circle cx="50" cy="190" r="12" class="a-ion"/>
    <text x="50" y="197" class="label" font-size="10">A</text>

    <circle cx="190" cy="190" r="12" class="a-ion"/>
    <text x="190" y="197" class="label" font-size="10">A</text>
  </g>
</svg>

<main id="app"></main>

<footer class="app-footer">
  <p style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 4px;">SKILLS & EXPERTISE DEVELOPMENT FOR MANPOWER</p>
  <p>&copy; 2026 ISC Laboratory, KMUTT. All rights reserved.</p>
</footer>

<nav class="bottomnav">
  <button data-page="setup" class="nav-btn active"><span class="ic">①</span><span>Setup</span></button>
  <button data-page="mapbi3" class="nav-btn"><span class="ic">Pb</span><span>MAPbI₃</span></button>
  <button data-page="fapbi3" class="nav-btn"><span class="ic">Pb</span><span>FAPbI₃</span></button>
  <button data-page="mapbbr3" class="nav-btn"><span class="ic">Pb</span><span>MAPbBr₃</span></button>
  <button data-page="mixed" class="nav-btn"><span class="ic">⚗</span><span>Mixed</span></button>
  <button data-page="dopants" class="nav-btn"><span class="ic">+</span><span>Dopants</span></button>
  <button data-page="spiro" class="nav-btn"><span class="ic">H</span><span>Spiro</span></button>
  <button data-page="ptaa" class="nav-btn"><span class="ic">H</span><span>PTAA</span></button>
  <button data-page="density" class="nav-btn"><span class="ic">ρ</span><span>Density</span></button>
</nav>

<script src="data.js"></script>
<script src="calc.js"></script>
<script src="app.js"></script>
</body>
</html>
